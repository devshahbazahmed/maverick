<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 110" fill="none">
  <!-- M icon mark -->
  <!-- Left leg of M -->
  <polygon points="72,28 84,28 84,72 72,72" fill="#ffffff"/>
  <!-- Right leg of M -->
  <polygon points="108,28 120,28 120,72 108,72" fill="#ffffff"/>
  <!-- Left diagonal (M center-left) -->
  <polygon points="72,28 84,28 96,52 84,52" fill="#ffffff"/>
  <!-- Right diagonal (M center-right) -->
  <polygon points="108,28 120,28 108,52 96,52" fill="#ffffff"/>
  <!-- Gold accent square — top right of M icon -->
  <rect x="108" y="20" width="12" height="12" fill="#d4a017"/>

  <!-- MAVERICK wordmark -->
  <text
    x="110"
    y="95"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-size="16"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="6"
    text-anchor="middle"
  >MAVERICK</text>

  <!-- Gold underline rule -->
  <line x1="72" y1="102" x2="148" y2="102" stroke="#d4a017" stroke-width="1.5"/>
</svg>
